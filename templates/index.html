<!DOCTYPE html>
<html>

<head>
    <title>School AI Assistant</title>
</head>

<body>

<h1>School AI Assistant</h1>

<input
    id="question"
    type="text"
    style="width:500px;"
    placeholder="Ask a question..."
>

<button
    id="askButton"
    onclick="askQuestion()">
    Ask
</button>

<button
    id="stopButton"
    onclick="stopGeneration()"
    disabled>
    Stop
</button>

<br><br>

<pre id="answer"></pre>

<script>

let currentReader = null;

function stopGeneration() {

    if (currentReader) {

        currentReader.cancel();

        currentReader = null;
    }

    document.getElementById(
        "askButton"
    ).disabled = false;

    document.getElementById(
        "stopButton"
    ).disabled = true;
}

async function askQuestion() {

    let question =
        document.getElementById(
            "question"
        ).value;

    let answerBox =
        document.getElementById(
            "answer"
        );

    if (!question.trim()) {
        return;
    }

    const askButton =
        document.getElementById(
            "askButton"
        );

    const stopButton =
        document.getElementById(
            "stopButton"
        );

    askButton.disabled = true;
    stopButton.disabled = false;

    answerBox.textContent =
        "Retrieving knowledge...";

    try {

        const response =
            await fetch(
                "/stream_ask",
                {
                    method: "POST",

                    headers: {
                        "Content-Type":
                        "application/json"
                    },

                    body: JSON.stringify({
                        question: question
                    })
                }
            );

        answerBox.textContent =
            "Generating answer...";

        currentReader =
            response.body.getReader();

        const reader =
            currentReader;

        const decoder =
            new TextDecoder();

        let firstChunk = true;

        while (true) {

            const {
                value,
                done
            } = await reader.read();

            if (done) {
                break;
            }

            if (firstChunk) {

                answerBox.textContent = "";

                firstChunk = false;
            }

            answerBox.textContent +=
                decoder.decode(
                    value,
                    {
                        stream: true
                    }
                );
        }

    } catch (error) {

        answerBox.textContent =
            "Error: " + error;

    } finally {

        askButton.disabled = false;

        stopButton.disabled = true;

        currentReader = null;
    }
}

</script>

</body>

</html>
